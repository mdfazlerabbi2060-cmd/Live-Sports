<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional HLS Player</title>
    
    <!-- Video.js Styles -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .video-container { width: 100%; max-width: 800px; }
        .video-js { width: 100%; height: auto; aspect-ratio: 16/9; }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="my-hls-player" class="video-js vjs-big-play-centered" controls preload="auto">
            <!-- আপনার HLS বা .m3u8 লিংকটি এখানে বসান -->
            <source src="http://10.222.222.222:8083/TSportsHD/tracks-v1a1/mono.m3u8?token=5d079e79249294f92a5b594cd80f804e0a24a25c-3aaa6e6e236407ba2d7d030f2fc61c57-1781526052-1781515252" type="application/x-mpegURL">
        </video>
    </div>

    <!-- Scripts -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/videojs-contrib-hls@5.15.0/dist/videojs-contrib-hls.min.js"></script>
    
    <script>
        // প্লেয়ার ইনিশিয়ালাইজেশন
        var player = videojs('my-hls-player');
        
        // অটো প্লে অন করা
        player.ready(function() {
            this.play();
        });
    </script>
</body>
</html>
